name: Contract and Newman Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI
        run: npx @redocly/cli lint contracts/*.yaml

      - name: Install Prism
        run: npm install -g @stoplight/prism-cli

      - name: Start mock servers
        run: |
          mkdir -p reports
          nohup npx prism mock contracts/core-business.openapi.yaml --port 4010 --host 0.0.0.0 > core.log 2>&1 &
          nohup npx prism mock contracts/access-gate.openapi.yaml --port 4011 --host 0.0.0.0 > gate.log 2>&1 &

      - name: Wait 20s for Prism
        run: sleep 20

      - name: Show Core log
        run: cat core.log || true

      - name: Show Gate log
        run: cat gate.log || true

      - name: Wait for mock
        run: |
          npx wait-on http-get://localhost:4010/health --timeout 60000
          # npx wait-on http-get://localhost:4011/health --timeout 60000

      - name: Run Newman
        run: |
          npx newman run postman/collections/FIT4110_lab03_core_business.postman_collection.json \
          -e postman/environments/FIT4110_lab03_core_mock.postman_environment.json \
          -r cli,junit,htmlextra \
          --reporter-junit-export reports/newman-report.xml \
          --reporter-htmlextra-export reports/newman-report.html

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/

      - name: Show logs if failed
        if: failure()
        run: |
          cat core.log || true
          cat gate.log || true